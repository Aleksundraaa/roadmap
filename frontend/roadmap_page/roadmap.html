<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoadMap | Просмотр холста</title>
    <link rel="stylesheet" href="roadmap-style.css">
</head>

<body>
    <header class="top-bar">
        <button onclick="location.href='../start_page/index.html'" class="btn-back">← Назад</button>
        <div class="info">
            <h1 id="roadmapTitle">План обучения: Веб-разработка</h1>
            <div class="key-container">
                <span>Ключ: </span>
                <code id="roadmapKey">7059e041</code>
                <button class="icon-btn" onclick="copyKey()" title="Копировать">📋</button>
                <span id="copyStatus">Скопировано!</span>
            </div>
        </div>
        <div class="header-actions">
            <button id="btnCreateNode" class="btn-plus" title="Добавить новую тему">
                <span>+</span> Добавить занятие
            </button>
            <button class="btn-theme" onclick="switchThemeToggle()" title="Сменить тему">🌓</button>
        </div>
    </header>
    <main id="canvas-container">
        <div id="canvas-content">
            <!-- SVG для отрисовки связей (ребер) -->
            <svg id="canvas-svg"></svg>
            <!-- Слой для прямоугольных узлов (занятий) -->
            <div id="nodes-layer"></div>
        </div>

        <!-- Модалка с деталями темы -->
        <div id="details-panel" class="side-panel">
            <div class="panel-content">
                <button class="close-btn" onclick="closeDetails()">×</button>
                <h2 id="node-detail-title">Тема</h2>
                <div class="progress-info">
                    <span>Прогресс обучения:</span>
                    <span id="node-detail-progress">3/8 задач</span>
                </div>
                <p id="node-detail-desc"></p>
                <div class="task-list-mock">
                    <!-- Просто визуальные заглушки задач -->
                    <div class="task-item done">✓ Базовый синтаксис</div>
                    <div class="task-item done">✓ Работа с DOM</div>
                    <div class="task-item">○ Асинхронные запросы</div>
                    <div class="task-item">○ Тестирование</div>
                </div>
            </div>
        </div>
    </main>

    <script src="roadmap-logic.js"></script>
</body>

</html>
