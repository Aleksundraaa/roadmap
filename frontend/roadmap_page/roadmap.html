<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoadMap | Просмотр холста</title>
    <link rel="stylesheet" href="roadmap-style.css">
</head>
<body>
<header class="top-bar">
    <button onclick="location.href='../start_page/index.html'" class="btn-back">← Назад</button>
    <div class="info">
        <h1 id="roadmapTitle">Загрузка плана...</h1>
        <div class="key-container">
            <span>Ключ: </span>
            <code id="roadmapKey">--------</code>
            <button class="icon-btn" onclick="copyKey()" title="Копировать">📋</button>
            <span id="copyStatus">Скопировано!</span>
        </div>
    </div>
    <div class="search-container">
        <input type="text" id="nodeSearch" placeholder="Поиск темы..." oninput="handleSearch()">
        <div id="searchResults" class="search-results"></div>
    </div>
    <div class="header-actions">
        <button id="btnCreateNode" class="btn-plus"><span>+</span> Добавить занятие</button>
        <button class="btn-theme" onclick="switchThemeToggle()">🌓</button>
    </div>
</header>

<main id="canvas-container">
    <div id="canvas-content">
        <svg id="canvas-svg"></svg>
        <div id="nodes-layer"></div>
    </div>

    <div id="node-modal" class="modal-overlay" onclick="handleOverlayClick(event)">
        <div class="modal-card">
            <div class="modal-header">
                <h2>Редактирование темы</h2>
                <button class="close-modal-btn" onclick="closeDetails()">×</button>
            </div>
            <div class="modal-body">
                <div class="edit-group">
                    <label>Название темы</label>
                    <input type="text" id="node-edit-title" placeholder="Напр. Основы JS">
                </div>
                <div class="edit-group">
                    <label>Описание</label>
                    <textarea id="node-edit-desc" rows="5" placeholder="О чем эта тема?"></textarea>
                </div>
            </div>
            <div class="edit-group">
                <label>Статус</label>
                <select id="node-edit-status">
                    <option value="todo">В плане</option>
                    <option value="doing">В процессе</option>
                    <option value="done">Завершено</option>
                </select>
            </div>
            <div class="modal-actions">
                <button id="btnSaveNode" class="btn-save">Сохранить</button>
                <button class="btn-cancel" onclick="closeDetails()">Отмена</button>
            </div>
            <button id="btnDeleteNode" class="btn-delete">Удалить тему</button>
        </div>
    </div>
</main>

<script src="roadmap-logic.js"></script>
</body>
</html>
