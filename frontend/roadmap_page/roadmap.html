<!DOCTYPE html>
<html lang="ru">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoadMap | Просмотр холста</title>
    <link rel="stylesheet" href="roadmap-style.css">
</head>
<body>
<header class="top-bar">
    <button onclick="location.href='../start_page/index.html'" class="btn-back">← Назад</button>

        <h1 id="roadmapTitle">Загрузка...</h1>

            <small id="copyStatus" style="display: none; color: #58a6ff; margin-left: 10px;">Скопировано!</small>
        </div>
    </div>
</header>
<main id="canvas-container">
    <div id="canvas-content">
        <div id="canvas-placeholder">
            <p>Здесь будет холст с узлами</p>
        </div>
    </div>
</main>

<script src="roadmap-logic.js"></script>

</html>
